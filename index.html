<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho 2026</title>
    <style>
        /* Estilos gerais */
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(to bottom, #a8e6cf, #dcedc1);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Container central */
        .container {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 50px;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            animation: fadeIn 2s ease-in-out;
            position: relative;
        }

        /* Título principal */
        h1 {
            font-size: 3rem;
            color: #2e7d32;
            text-shadow: 2px 2px 5px #a5d6a7;
            margin-bottom: 20px;
        }

        /* Nome do participante */
        h2 {
            font-size: 2rem;
            color: #ff6f00;
            text-shadow: 1px 1px 3px #ffd54f;
            margin-bottom: 15px;
        }

        /* Mensagem extra */
        p {
            font-size: 1.2rem;
            color: #4e342e;
            margin-top: 10px;
        }

        /* Animação de fade-in */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Decoração divertida com emojis */
        .container::before {
            content: "🌱🌻🌾";
            display: block;
            font-size: 2rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Agrinho 2026</h1>
        <h2>Luiz Otavio Berlesi Dalsegio</h2>
        <p>Celebrando o aprendizado, a natureza e a cidadania!</p>
    </div>
</body>
</html>
